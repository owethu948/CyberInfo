name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest   # WPF requires Windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore CyberInfo/CyberInfo.csproj

      - name: Build the application
        run: dotnet build CyberInfo/CyberInfo.csproj --configuration Release --no-restore

      - name: Publish as portable executable (optional)
        run: dotnet publish CyberInfo/CyberInfo.csproj --configuration Release --output ./publish --no-build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CyberInfo-build
          path: ./publish
